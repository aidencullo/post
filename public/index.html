<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostDrop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      padding: 72px 32px;
      max-width: 680px;
      margin: 0 auto;
    }

    [contenteditable] {
      outline: none;
      cursor: text;
      display: block;
      width: 100%;
      border-radius: 4px;
    }

    [contenteditable]:empty:before {
      content: attr(data-placeholder);
      color: #ccc;
      pointer-events: none;
    }

    #content {
      font-size: 18px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 120px;
    }

    #copy {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 12px;
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      display: none;
    }

    #copy:hover { color: #555; background: #f0f0f0; }

    #save {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: none;
      transition: background 0.15s;
    }

    #save:hover { background: #333; }
    #save:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>
  <div id="content" contenteditable="true" data-placeholder=""></div>
  <button id="copy" onclick="copyLink()">copy link</button>
  <button id="save" onclick="savePost()">Publish</button>

  <script>
    const postId = location.pathname.match(/\/posts\/([a-z0-9]+)/)?.[1];

    async function init() {
      if (postId) {
        const res = await fetch(`/api/posts/${postId}`);
        if (res.ok) {
          const { content } = await res.json();
          document.getElementById('content').innerText = content;
          document.title = content.slice(0, 40) || 'PostDrop';
          document.getElementById('copy').style.display = 'block';

          document.getElementById('content').addEventListener('input', () => {
            document.getElementById('save').textContent = 'Save new version';
            document.getElementById('save').style.display = 'block';
          });
        } else {
          document.getElementById('content').innerText = 'Post not found.';
        }
      } else {
        document.getElementById('content').addEventListener('input', () => {
          document.getElementById('save').style.display = 'block';
        }, { once: true });
        document.getElementById('content').focus();
      }
    }

    async function savePost() {
      const btn = document.getElementById('save');
      const content = document.getElementById('content').innerText.trim();
      if (!content) return;

      btn.disabled = true;
      btn.textContent = 'Saving…';

      const res = await fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });

      if (res.ok) {
        const { id } = await res.json();
        history.pushState(null, '', `/posts/${id}`);
        document.getElementById('copy').style.display = 'block';
        btn.style.display = 'none';
        btn.disabled = false;
      } else {
        btn.textContent = 'Error — retry';
        btn.disabled = false;
      }
    }

    function copyLink() {
      navigator.clipboard.writeText(location.href).then(() => {
        const btn = document.getElementById('copy');
        btn.textContent = 'copied!';
        setTimeout(() => btn.textContent = 'copy link', 1800);
      });
    }

    init();
  </script>
</body>
</html>
